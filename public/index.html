<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Median App Builder</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #333;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
            font-size: 14px;
        }
        input[type="text"],
        input[type="email"],
        input[type="url"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.2s;
        }
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="url"]:focus {
            border-color: #667eea;
            outline: none;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px 0;
        }
        .file-note {
            font-size: 13px;
            color: #777;
            margin-top: 4px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: #5a67d8;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background: #b3b3b3;
            cursor: not-allowed;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: none;
        }
        .result.success {
            border-left-color: #48bb78;
        }
        .result.error {
            border-left-color: #f56565;
        }
        .result h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        .result a {
            color: #667eea;
            word-break: break-all;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .button-content {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Median App Builder</h1>
        <div class="subtitle">Buat aplikasi iOS & Android dari website mu</div>

        <form id="appForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="url">Website URL *</label>
                <input type="url" id="url" name="url" placeholder="https://example.com" required value="https://raystore.mysrv.web.id/">
            </div>

            <div class="form-group">
                <label for="appName">App Name *</label>
                <input type="text" id="appName" name="appName" placeholder="Ray Store" required value="Ray Store">
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" placeholder="nama@example.com" required value="name@example.com">
            </div>

            <div class="form-group">
                <label for="icon">App Icon * (PNG/JPG, minimal 1024x1024)</label>
                <input type="file" id="icon" name="icon" accept="image/png, image/jpeg" required>
                <div class="file-note">Ukuran file maksimal 10 MB</div>
            </div>

            <button type="submit" id="submitBtn">
                <span class="button-content">
                    <span id="btnText">Mulai Build</span>
                </span>
            </button>
        </form>

        <div id="result" class="result">
            <h3 id="resultTitle">Hasil</h3>
            <p id="resultMessage"></p>
        </div>

        <footer>
            <p>Powered by Median.co & Vercel</p>
        </footer>
    </div>

    <script>
        const form = document.getElementById('appForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const resultDiv = document.getElementById('result');
        const resultTitle = document.getElementById('resultTitle');
        const resultMessage = document.getElementById('resultMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validasi file
            const fileInput = document.getElementById('icon');
            if (fileInput.files.length === 0) {
                showError('Silakan pilih file icon.');
                return;
            }
            const file = fileInput.files[0];
            if (!file.type.startsWith('image/')) {
                showError('File harus berupa gambar (PNG/JPG).');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showError('Ukuran file maksimal 10 MB.');
                return;
            }

            // Tampilkan loading
            setLoading(true);

            // Buat FormData
            const formData = new FormData(form);

            try {
                const response = await fetch('/api/create-app', {
                    method: 'POST',
                    body: formData,
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Terjadi kesalahan');
                }

                // Tampilkan sukses
                resultDiv.className = 'result success';
                resultTitle.innerText = '✅ Berhasil!';
                resultMessage.innerHTML = `
                    <strong>Build URL:</strong><br>
                    <a href="${data.buildUrl}" target="_blank" rel="noopener noreferrer">${data.buildUrl}</a><br><br>
                    ${data.message || ''}
                `;
                resultDiv.style.display = 'block';
            } catch (error) {
                showError(error.message);
            } finally {
                setLoading(false);
            }
        });

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                btnText.innerHTML = '<span class="loading"></span> Memproses...';
            } else {
                submitBtn.disabled = false;
                btnText.innerText = 'Mulai Build';
            }
        }

        function showError(message) {
            resultDiv.className = 'result error';
            resultTitle.innerText = '❌ Gagal';
            resultMessage.innerText = message;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
                        </html>
