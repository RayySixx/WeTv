<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ray Median Auto-Builder</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #1e1e1e; padding: 30px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-top: 0; color: #bb86fc; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #aaa; }
        input[type="text"], input[type="email"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 5px; background-color: #2c2c2c; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #bb86fc; color: #121212; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #9965f4; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; font-size: 14px; word-wrap: break-word; }
        .success { background-color: #1b5e20; border: 1px solid #2e7d32; }
        .error { background-color: #b71c1c; border: 1px solid #c62828; }
        a { color: #82b1ff; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>Auto App Builder</h2>
    <form id="builderForm">
        <div class="form-group">
            <label>Website URL</label>
            <input type="text" id="url" placeholder="https://raystore.mysrv.web.id/" required>
        </div>
        <div class="form-group">
            <label>App Name</label>
            <input type="text" id="appName" placeholder="Ray Store" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
            <label>App Icon (1024x1024)</label>
            <input type="file" id="icon" accept="image/png, image/jpeg" required>
        </div>
        <button type="submit" id="submitBtn">Start Building my App!</button>
    </form>

    <div id="result"></div>
</div>

<script>
    document.getElementById('builderForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');
        
        btn.disabled = true;
        btn.innerText = "Memproses...";
        resultDiv.style.display = "none";
        resultDiv.className = "";

        // Siapkan data form (termasuk file)
        const formData = new FormData();
        formData.append('url', document.getElementById('url').value);
        formData.append('appName', document.getElementById('appName').value);
        formData.append('email', document.getElementById('email').value);
        formData.append('icon', document.getElementById('icon').files[0]);

        try {
            const response = await fetch('/api/build', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            resultDiv.style.display = "block";
            if(data.status === "success") {
                resultDiv.className = "success";
                resultDiv.innerHTML = `<strong>Berhasil!</strong><br>${data.message}<br><br><a href="${data.data.check_url}" target="_blank">Klik di sini untuk melihat status & download APK/IOS</a>`;
            } else {
                resultDiv.className = "error";
                resultDiv.innerText = `Error: ${data.message}`;
            }
        } catch (err) {
            resultDiv.style.display = "block";
            resultDiv.className = "error";
            resultDiv.innerText = "Terjadi kesalahan pada server.";
        } finally {
            btn.disabled = false;
            btn.innerText = "Start Building my App!";
        }
    });
</script>

</body>
</html>
